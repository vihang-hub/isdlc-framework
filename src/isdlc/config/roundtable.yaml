# Roundtable Analysis Configuration
# See: docs/isdlc/persona-authoring-guide.md

# Conversation style: conversational | bulleted | silent
verbosity: conversational

# Personas pre-selected for every analysis (user can still add/remove)
default_personas:
  - persona-business-analyst
  - persona-solutions-architect
  - persona-system-designer

# Personas excluded from recommendations (still available for manual add)
disabled_personas: []
